kind = "web"
previewPath = "/"
title = "Hashapp"
version = "1.0.0"
id = "artifacts/hashapp"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20440
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/hashapp run dev"

[services.env]
PORT = "20440"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/hashapp", "run", "build"]
publicDir = "artifacts/hashapp/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
